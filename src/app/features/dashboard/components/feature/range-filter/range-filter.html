<form class="range-filter" [formGroup]="rangeForm">
  <div class="range-filter__container">
    <!-- Start Date -->
    <mat-form-field appearance="outline" class="range-filter__field">
      <mat-label>Start Date</mat-label>
      <input matInput [matDatepicker]="startPicker" formControlName="startDate" />
      <mat-datepicker-toggle matIconSuffix [for]="startPicker"></mat-datepicker-toggle>
      <mat-datepicker #startPicker></mat-datepicker>
      @if(isSubmited()){
        <mat-error>{{ startDateError }}</mat-error>
      }
    </mat-form-field>

    <!-- End Date -->
    <mat-form-field appearance="outline" class="range-filter__field">
      <mat-label>End Date</mat-label>
      <input matInput [matDatepicker]="endPicker" formControlName="endDate" />
      <mat-datepicker-toggle matIconSuffix [for]="endPicker"></mat-datepicker-toggle>
      <mat-datepicker #endPicker></mat-datepicker>
      @if(isSubmited()){
        <mat-error>{{ endDateError }}</mat-error>
      }
    </mat-form-field>

    <!-- Buttons -->
    <div class="range-filter__actions">
      <app-button-component type="submit" size="medium" (click)="applyFilter()"
        >Apply</app-button-component
      >
      <app-button-component type="reset" size="medium" variant="secondary" (click)="reset()"
        >Reset</app-button-component
      >
    </div>
  </div>
</form>
