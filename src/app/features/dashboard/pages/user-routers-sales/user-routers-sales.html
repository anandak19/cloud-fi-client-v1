<div class="router-sales">
  <app-page-title-component title="Router Sales">
    <app-back-button-component/>
  </app-page-title-component>

  <app-router-sales-card-component
    [routerCashData]="routerCashData"
  ></app-router-sales-card-component>

  <div class="router-sales__vouchers">
    <h3>Voucher Sales</h3>
    <app-table-listing-component
      [columns]="couponColumns"
      [dataSource]="paginatedData"
      [actions]="false"
    ></app-table-listing-component>

    @if (coupons.length > 0) {
    <app-paginator-component
      [dataLength]="coupons.length"
      (onPaginatorEvent)="onPageChange($event)"
    ></app-paginator-component>
    }
  </div>
</div>
